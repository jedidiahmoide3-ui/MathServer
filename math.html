<html>
    <head>
        <title></title>
    </head>
    <style>
          body
          {
            background:linear-gradient(45deg,rgb(185, 45, 45),rgb(190, 12, 210));
            margin:10px;
          }  
          .head
          {
            gap:40px;
            position: fixed;
            bottom:10%;
            left:35%;
            border: dashed 4px rgb(255, 255, 255);
            border-radius: 20px;
            background: rgb(255, 209, 23);
            padding:100px;
          }
          input
         {
            margin-top: 10px;
            padding: 8px;
            border-radius: 20px;
         }
         .form
         {
            border-radius: 10px;
            width:10px;
         }
         .submit
         {
            color:black;
            background-color: rgba(255, 255, 255, 0.642);
         }
          
    </style>
    <body>
        <center>
            <div class="head">
                <h1>PRICE CALCULATER</h1>
                <h2>JEDIDIAH M D (25012775)</h2>
                <form method="POST">
                    {% csrf_token %}
                <label>PRICE:</label>
                <input type="text" name="PRICE" value="{{Price}}">
                <br><br>
                <label>GST:</label>
                <input type="text" name="GST" value="{{GST}}">
                <br><br>
                <input type="submit" value="CALCULATE">
                <br><br>
                <label>TOTAL:</label>
                <input type="text" value="{{Total}}">
                </form>
            </div>
        </center>
    </body>
</html>
